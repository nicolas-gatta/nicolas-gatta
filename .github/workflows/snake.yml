# Place this file at: .github/workflows/snake.yml  (in your nicolas-gatta/nicolas-gatta repo)
#
# Generates THREE differently-colored snake SVGs in one run — one per README theme —
# and pushes them to the `output` branch. Each README variant then points at its own file.

name: generate themed snakes

on:
  schedule:
    - cron: "0 */12 * * *"   # refresh twice a day
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate snake svgs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark-souls.svg?color_snake=%238B0000&color_dots=%233A3A3A,%235C5C5C,%238B0000,%23D4AF37
            dist/snake-elden-ring.svg?color_snake=%23F0C75E&color_dots=%233D2E12,%237A5C1E,%23B8860B,%23F0C75E
            dist/snake-solaire.svg?color_snake=%23CC6600&color_dots=%23FFF3D6,%23FFD966,%23FFB84D,%23CC6600

      - name: push snake svgs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
